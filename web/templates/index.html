<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alta Tecnologia RAG Local</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

    <div class="app">

        <!-- Barra lateral: lista de chats guardados -->
        <aside class="barra-lateral">
            <button id="btn-nuevo-chat" class="btn-nuevo-chat">+ Nuevo chat</button>
            <div id="lista-chats" class="lista-chats">
                <!-- Los chats guardados se insertan aqui por JS -->
            </div>
        </aside>

        <!-- Area principal de conversacion -->
        <main class="principal">

            <header class="encabezado">
                <!-- Logo de la marca: version oscura para el tema dia y
                     version blanca para el tema noche (el CSS alterna
                     cual se ve segun la clase tema-oscuro del body). -->
                <span class="titulo">
                    <img src="/static/img/logo-dia.png" alt="Alta Tecnologia" class="logo logo-dia">
                    <img src="/static/img/logo-noche.png" alt="Alta Tecnologia" class="logo logo-noche">
                </span>
                <div class="encabezado-controles">
                    <div class="usuario-info">
                        <span id="usuario-nombre" class="usuario-nombre"></span>
                        <span id="usuario-rol" class="usuario-rol"></span>
                    </div>
                    <!-- Solo visible para admins (lo muestra app.js) -->
                    <button id="btn-admin" class="btn-admin" title="Administrar usuarios" hidden>Usuarios</button>
                    <button id="btn-tema" class="btn-tema" title="Cambiar tema claro/oscuro">🌓</button>
                    <button id="btn-salir" class="btn-salir" title="Cerrar sesión">Salir</button>
                </div>
            </header>

            <div id="mensajes" class="mensajes">
                <p class="placeholder">Selecciona un chat de la izquierda o crea uno nuevo para empezar.</p>
            </div>

            <form id="form-mensaje" class="form-mensaje">
                <textarea
                    id="entrada"
                    placeholder="Escribe tu pregunta... (Ctrl+Enter para enviar)"
                    rows="1"
                ></textarea>
                <button id="btn-enviar" type="submit">Enviar</button>
            </form>

        </main>
    </div>

    <!-- Modal de administración de usuarios (solo admins). app.js lo llena. -->
    <div id="modal-admin" class="modal-fondo" hidden>
        <div class="modal-caja">
            <div class="modal-titulo">
                <h2>Administración de usuarios</h2>
                <button id="btn-cerrar-admin" class="modal-cerrar" title="Cerrar">×</button>
            </div>

            <table class="tabla-usuarios">
                <thead>
                    <tr>
                        <th>Nombre</th><th>Correo</th><th>Rol</th><th></th>
                    </tr>
                </thead>
                <tbody id="tabla-usuarios-body"></tbody>
            </table>

            <div class="form-nuevo-usuario">
                <h3>Crear usuario nuevo</h3>
                <div class="fila-campos">
                    <input id="nuevo-nombre" type="text" placeholder="Nombre">
                    <input id="nuevo-email" type="email" placeholder="Correo">
                </div>
                <div class="fila-campos">
                    <input id="nuevo-password" type="password" placeholder="Contraseña (mín. 8)">
                    <select id="nuevo-rol">
                        <option value="usuario">Usuario</option>
                        <option value="admin">Administrador</option>
                    </select>
                </div>
                <button id="btn-crear-usuario" class="btn-crear-usuario">Crear usuario</button>
                <p id="error-crear-usuario" class="error-usuario" hidden></p>
            </div>
        </div>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
