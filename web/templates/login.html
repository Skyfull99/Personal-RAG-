<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar sesión — Alta Tecnología RAG</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="tema-oscuro">

    <div class="login-pantalla">
        <form id="form-login" class="login-caja">
            <img src="/static/img/logo-noche.png" alt="Alta Tecnología" class="login-logo">
            <p class="login-subtitulo">Sistema de conocimiento RAG</p>

            <label class="login-label" for="email">Correo</label>
            <input id="email" type="email" class="login-input" autocomplete="username" required>

            <label class="login-label" for="password">Contraseña</label>
            <input id="password" type="password" class="login-input" autocomplete="current-password" required>

            <p id="login-error" class="login-error" hidden></p>

            <button id="btn-login" type="submit" class="login-boton">Ingresar</button>
        </form>
    </div>

    <script>
        // Login minimo: manda las credenciales al backend, que responde con
        // una cookie de sesion HttpOnly (no la maneja este JS) y redirige.
        const form = document.getElementById("form-login");
        const error = document.getElementById("login-error");
        const boton = document.getElementById("btn-login");

        form.addEventListener("submit", async (e) => {
            e.preventDefault();
            error.hidden = true;
            boton.disabled = true;
            boton.textContent = "Ingresando...";
            try {
                const resp = await fetch("/api/auth/login", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        email: document.getElementById("email").value,
                        password: document.getElementById("password").value,
                    }),
                });
                if (!resp.ok) {
                    const data = await resp.json().catch(() => ({}));
                    throw new Error(data.detail || "No se pudo iniciar sesión");
                }
                window.location.href = "/";
            } catch (err) {
                error.textContent = err.message;
                error.hidden = false;
                boton.disabled = false;
                boton.textContent = "Ingresar";
            }
        });
    </script>
</body>
</html>
